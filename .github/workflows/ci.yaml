name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your repo's code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 17 (or whatever version your project uses)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache Gradle dependencies so builds are faster next time
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable (Linux requirement)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Build the project (skipping tests as requested)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 6. Upload the built JAR so you can download it from GitHub
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar